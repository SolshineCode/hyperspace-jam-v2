<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hyperspace Jam</title>
        <link rel="stylesheet" href="styles.css">

        <!-- Primary Meta Tags -->
        <meta name="title" content="Hyperspace Jam — Hand-controlled psychedelic synth with hyperbolic geometry">
        <meta name="description" content="Hyperspace Jam — Hand-controlled psychedelic synth with hyperbolic geometry">

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="Hyperspace Jam — Hand-controlled psychedelic synth with hyperbolic geometry">
        <meta property="og:description" content="Hyperspace Jam — Hand-controlled psychedelic synth with hyperbolic geometry">

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image">
        <meta property="twitter:title" content="Hyperspace Jam — Hand-controlled psychedelic synth with hyperbolic geometry">
        <meta property="twitter:description" content="Hyperspace Jam — Hand-controlled psychedelic synth with hyperbolic geometry">

        <script type="importmap">
            {
                "imports": {
                    "three": "https://esm.sh/three@0.161.0?dev",
                    "three/": "https://esm.sh/three@0.161.0&dev/"
                }
            }
        </script>
    </head>
    <body style="width: 100%; height: 100%; overflow: hidden; margin: 0;">
        <div id="renderDiv" style="width: 100%; height: 100%; margin: 0;">

            <div id="controls-hint">
                <div class="hint-title">HYPERSPACE JAM</div>
                <div class="hint-grid">
                    <span class="hint-icon">✋</span><span class="hint-desc">Hand height → pitch</span>
                    <span class="hint-icon">👌</span><span class="hint-desc">Pinch → volume</span>
                    <span class="hint-icon">🤟</span><span class="hint-desc">Wiggle fingers → play notes</span>
                    <span class="hint-icon">✊</span><span class="hint-desc">Fist → change sound</span>
                    <span class="hint-icon">👋</span><span class="hint-desc">Fast move → percussion</span>
                    <span class="hint-icon">🤚</span><span class="hint-desc">2nd hand → drums</span>
                </div>
                <div class="hint-fade">tap anywhere to dismiss</div>
            </div>

        </div>
        <div id="attract-mode">
            <div id="attract-text">STEP UP TO JAM</div>
            <div id="attract-sub">wave your hands to make music</div>
        </div>
        <script type="module" src="main.js"></script>
    </body>
</html>
